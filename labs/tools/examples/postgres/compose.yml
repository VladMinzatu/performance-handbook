# Example / template for a "system under test" service. Copy this pattern
# into a numbered experiment directory (e.g. labs/001-.../compose.yml) and
# adjust as needed - the only hard requirement is joining the external
# `labnet` network created by labs/tools/analysis/compose.yml.
services:
  postgres:
    image: postgres:16
    container_name: lab-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: labdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - labnet

networks:
  labnet:
    external: true

volumes:
  pgdata:
