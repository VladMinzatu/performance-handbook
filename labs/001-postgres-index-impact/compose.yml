# System under test for lab 001. Joins the external `labnet` network created
# by labs/tools/analysis/compose.yml so the analysis container can reach it.
services:
  postgres:
    image: postgres:16
    container_name: lab-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: labdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - labnet

networks:
  labnet:
    external: true

volumes:
  pgdata:
